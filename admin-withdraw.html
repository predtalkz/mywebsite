<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dtalkz Admin - Withdrawal Portal</title>
  <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet" />
  <script>
    window.DTALKZ_API_BASE = "https://api.dtalkz.com";
  </script>
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .status-pill { font-size: 12px; padding: 4px 10px; border-radius: 999px; }
    .status-pending { background: #3d2f00; color: #ffd666; }
    .status-approved { background: #0f5132; color: #7ee787; }
    .status-rejected { background: #5a1a1a; color: #ffa198; }
    .upi-box {
      background: #0f172a;
      border: 1px dashed #ffc451;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 1.15rem;
      font-weight: 700;
      color: #ffc451;
      word-break: break-all;
    }
    .net-amount { font-size: 1.35rem; font-weight: 800; color: #7ee787; }
    .muted { color: #8b949e; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
      <div>
        <h3 class="mb-1">Dtalkz Admin — Withdrawal Portal</h3>
        <p class="small muted mb-0">Approve after you send the net amount manually via UPI from your phone.</p>
      </div>
      <a href="admin-kyc.html" class="btn btn-outline-secondary btn-sm">KYC Portal</a>
    </div>

    <div id="loginCard" class="card p-3 mb-4">
      <h5 class="mb-3">Admin Login</h5>
      <div class="row g-2">
        <div class="col-md-4"><input id="username" class="form-control" placeholder="Username" /></div>
        <div class="col-md-4"><input id="password" type="password" class="form-control" placeholder="Password" /></div>
        <div class="col-md-4 d-grid"><button id="loginBtn" class="btn btn-warning">Login</button></div>
      </div>
      <small class="mt-2 text-secondary">Same credentials as KYC portal</small>
    </div>

    <div id="panel" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div class="d-flex gap-2">
          <select id="statusFilter" class="form-select form-select-sm">
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
            <option value="all">All</option>
          </select>
          <button id="refreshBtn" class="btn btn-outline-light btn-sm">Refresh</button>
        </div>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
      </div>
      <div id="sessionNote" class="alert alert-secondary py-2">Session active (auto logout in 1 hour).</div>
      <div id="list" class="row g-3"></div>
    </div>
  </div>

  <script>
    function resolveApiBase() {
      let base = (typeof window.DTALKZ_API_BASE === "string" && window.DTALKZ_API_BASE)
        ? window.DTALKZ_API_BASE.trim().replace(/\/$/, "")
        : "https://api.dtalkz.com";
      if (window.location.protocol === "https:" && base.startsWith("http://")) {
        base = "https://" + base.slice("http://".length);
      }
      return base;
    }

    const API_BASE = resolveApiBase();
    const TOKEN_KEY = "dtalkz_admin_token";
    const EXPIRE_KEY = "dtalkz_admin_expire_at";
    const listEl = document.getElementById("list");
    const panel = document.getElementById("panel");
    const loginCard = document.getElementById("loginCard");
    const statusFilter = document.getElementById("statusFilter");

    function authHeaders() {
      return {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + (localStorage.getItem(TOKEN_KEY) || ""),
      };
    }

    function logout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(EXPIRE_KEY);
      panel.classList.add("d-none");
      loginCard.classList.remove("d-none");
      listEl.innerHTML = "";
    }

    function enforceSession() {
      const expireAt = Number(localStorage.getItem(EXPIRE_KEY) || 0);
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token || !expireAt || Date.now() >= expireAt) {
        logout();
        return false;
      }
      return true;
    }

    async function parseJsonResponse(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch (e) {
        throw new Error("Server did not return JSON: " + text.slice(0, 120));
      }
    }

    async function adminLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const res = await fetch(API_BASE + "/v1/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });
      const json = await parseJsonResponse(res);
      if (!res.ok || json.statusCode !== 200 || !json.data?.token) {
        alert((json && json.data) || "Login failed");
        return;
      }
      localStorage.setItem(TOKEN_KEY, json.data.token);
      localStorage.setItem(EXPIRE_KEY, String(Date.now() + (60 * 60 * 1000)));
      loginCard.classList.add("d-none");
      panel.classList.remove("d-none");
      await loadRequests();
    }

    function statusClass(status) {
      if (status === "approved") return "status-approved";
      if (status === "rejected") return "status-rejected";
      return "status-pending";
    }

    function rs(n) {
      return "₹" + Number(n || 0).toFixed(2);
    }

    function escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadRequests() {
      if (!enforceSession()) return;
      const status = statusFilter.value || "pending";
      const res = await fetch(
        API_BASE + "/v1/admin/withdraw/requests?status=" + encodeURIComponent(status),
        { method: "GET", headers: authHeaders() }
      );
      if (res.status === 401 || res.status === 403) {
        alert("Session expired. Please login again.");
        logout();
        return;
      }
      const json = await parseJsonResponse(res);
      if (!res.ok || json.statusCode !== 200) {
        alert(json.data || "Failed to load withdrawal requests");
        return;
      }
      const rows = json.data || [];
      if (!rows.length) {
        listEl.innerHTML = "<div class='col-12'><div class='alert alert-dark'>No withdrawal requests found.</div></div>";
        return;
      }
      listEl.innerHTML = rows.map((item) => `
        <div class="col-12">
          <div class="card p-3">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
              <div>
                <div><strong>User:</strong> ${escapeHtml(item.userName || "-")} <span class="muted small">(${escapeHtml(item.userId)})</span></div>
                <div><strong>Phone:</strong> ${escapeHtml(item.phone || "-")}</div>
                <div><strong>Crowns:</strong> ${item.crowns} &nbsp;|&nbsp; <strong>Gross:</strong> ${rs(item.grossInr)}</div>
                <div class="muted small mt-1">
                  Platform fee: ${rs(item.platformFee)} · TDS: ${rs(item.tdsAmount)} · Gateway: ${rs(item.gatewayFee)}
                </div>
                <div class="mt-1"><strong>Submitted:</strong> ${item.submittedAt ? new Date(item.submittedAt).toLocaleString() : "-"}</div>
              </div>
              <span class="status-pill ${statusClass(item.status)}">${item.status}</span>
            </div>

            <div class="row mt-3 g-3">
              <div class="col-md-6">
                <div class="small muted mb-1">Send this net amount via UPI</div>
                <div class="net-amount mb-2">${rs(item.netInr)}</div>
                <div class="small muted mb-1">UPI ID</div>
                <div class="upi-box">${escapeHtml(item.upiId || "—")}</div>
                ${item.bankName ? `<div class="small muted mt-2">Bank: ${escapeHtml(item.bankName)} · A/C: ${escapeHtml(item.accountNo)} · IFSC: ${escapeHtml(item.ifscCode)}</div>` : ""}
              </div>
              <div class="col-md-6">
                ${item.status === "pending" ? `
                  <p class="small">1. Open your UPI app and pay <strong>${rs(item.netInr)}</strong> to the UPI above.<br>2. Then click <strong>Mark paid (UPI sent)</strong>.</p>
                  <div class="d-flex flex-wrap gap-2">
                    <button class="btn btn-success btn-sm" onclick="takeAction('${item.id}','approve', ${item.netInr})">Mark paid (UPI sent)</button>
                    <button class="btn btn-danger btn-sm" onclick="takeAction('${item.id}','reject')">Reject & refund crowns</button>
                  </div>
                ` : `
                  <div class="small text-secondary">
                    Reviewed by: ${escapeHtml(item.reviewedBy || "-")}<br>
                    ${item.reviewedAt ? "On: " + new Date(item.reviewedAt).toLocaleString() : ""}
                    ${item.adminNote ? "<br>UPI note: " + escapeHtml(item.adminNote) : ""}
                    ${item.rejectionReason ? "<br>Reason: " + escapeHtml(item.rejectionReason) : ""}
                  </div>
                `}
              </div>
            </div>
          </div>
        </div>
      `).join("");
    }

    async function takeAction(requestId, action, netInr) {
      if (!enforceSession()) return;
      let reason = "";
      let adminNote = "";
      if (action === "reject") {
        reason = prompt("Rejection reason (crowns will be refunded to creator wallet):");
        if (!reason || !reason.trim()) {
          alert("Rejection reason is required.");
          return;
        }
      } else {
        const ok = confirm("Did you send " + rs(netInr) + " via UPI from your phone?\n\nClick OK only after payment is done.");
        if (!ok) return;
        adminNote = prompt("Optional: UPI transaction reference / note:") || "";
      }
      const res = await fetch(API_BASE + "/v1/admin/withdraw/action", {
        method: "PUT",
        headers: authHeaders(),
        body: JSON.stringify({ requestId, action, reason, adminNote }),
      });
      const json = await parseJsonResponse(res);
      if (!res.ok || json.statusCode !== 200) {
        alert(json.data || "Action failed");
        return;
      }
      await loadRequests();
    }

    document.getElementById("loginBtn").addEventListener("click", adminLogin);
    document.getElementById("refreshBtn").addEventListener("click", loadRequests);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    statusFilter.addEventListener("change", loadRequests);
    window.takeAction = takeAction;

    setInterval(() => {
      if (!enforceSession()) return;
      const expireAt = Number(localStorage.getItem(EXPIRE_KEY) || 0);
      const minutesLeft = Math.max(0, Math.ceil((expireAt - Date.now()) / 60000));
      document.getElementById("sessionNote").innerText = `Session active (${minutesLeft} minute(s) left, auto logout in 1 hour).`;
    }, 15000);

    if (enforceSession()) {
      loginCard.classList.add("d-none");
      panel.classList.remove("d-none");
      loadRequests();
    }
  </script>
</body>
</html>
